<div flex="100">
  <md-toolbar id='det-header'>
    <div class="md-toolbar-tools">

      <a href="https://www.aiddata.org/geoquery">
        <img class="logo"
          ng-src={{config.logoUrl}}
          aria-label="Return to Geoquery Home"></img></a>

      <span flex></span>
      <md-button class="md-button header-button"
          aria-label="Help"
          ng-click="activate('help')">
        <i class='fa fa-question-circle' aria-hidden="true"></i>
        <span class="button-text">Help</span>
      </md-button>

      <md-button class="md-button header-button"
          aria-label="View Past Requests"
          ng-click="pastRequests()">
        <i class='fa fa-history' aria-hidden="true"></i>
        <span class="button-text">Past Requests</span>
      </md-button>

      <md-button class="md-button {{ highlight }} md-hue-2"
          aria-label="Review Request"
          ng-click="activate('cart')"
          ng-disabled="!queryLen"
          ng-class="{ 'md-raised': queryLen }"
          id="submitRequestBtn">

          <i class='fa fa-tasks' aria-hidden="true"></i>
        <span class="button-text">Submit Request</span>
        <span class="badge selection-count-badge"
            ng-show="queryLen || highlight">
          {{ queryLen || 0}}
        </span>
      </md-button>

    </div>
  </md-toolbar>

  <md-toolbar class="process-header md-hue-6" md-whiteframe="3">
    <div class="md-toolbar-tools process">

        <md-button class="md-button-pimary process-button"
            ng-disabled="true"
            ng-class="{ 'current': currentStep === 'map' }"
            ng-show="showSteps"
            md-no-ink>

          <i class="fa fa-map-pin fa-fw fa-lg" aria-hidden="true"></i>
          1. Select Boundary
        </md-button>

        <span ng-show="showSteps"> / </span>

        <md-button class="md-button-pimary process-button"
            ng-disabled="true"
            ng-class="{ 'current': currentStep.indexOf('search') >= 0 }"
            ng-show="showSteps"
            md-no-ink>

          <i class="fa fa-star fa-fw fa-lg" aria-hidden="true"></i>
          2. Customize Datasets
        </md-button>

        <span ng-show="showSteps"> / </span>

        <md-button class="md-button-pimary process-button"
            ng-disabled="true"
            ng-class="{ 'current': currentStep === 'checkout' }"
            ng-show="showSteps"
            md-no-ink>

          <i class="fa fa-tasks fa-fw fa-lg" aria-hidden="true"></i>
          3. Review Request
        </md-button>

        <span flex></span>

        <span>
          Powered by
          <a href="https://www.aiddata.org" class="homepage-button">AidData</a>
          and
          <a href="https://www.wm.edu/" class="homepage-button">William & Mary's</a>
          <a href="https://www.wm.edu/offices/global-research/" class="homepage-button"> Global Research Institute</a>
        </span>

    </div>
  </md-toolbar>
</div>
