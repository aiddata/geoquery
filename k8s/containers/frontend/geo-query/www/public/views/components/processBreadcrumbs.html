<ul class="breadcrumb-progress" layout="row"
    ng-class="{ 'justified': !!fullWidth }">

  <li
      ng-repeat="step in stepList"
      ng-if="step.name.indexOf('prep') < 0"
      ng-init="step.displayText = stepText(step.name);
               step.sortOrder = stepIndex(step.name);"
      ng-mouseenter="step.hover = hoverText(step);">

    <a href="" class="{{ step.displayText }} disabled"
        ng-class="step.sortOrder === currentStepIndex ? 'current' :
                  step.sortOrder > currentStepIndex ? 'incomplete' : 'finished'">

        <md-tooltip md-direction="top"> {{ step.hover }} </md-tooltip>

      <i class="fa fa-check-circle" aria-hidden="true"
          ng-class="{ 'invisible' : step.sortOrder >= currentStepIndex }" ></i>

      {{ step.displayText }}
    </a>
  </li>
</ul>
