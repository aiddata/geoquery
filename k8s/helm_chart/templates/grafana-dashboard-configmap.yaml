# this ConfigMap makes the dashboard defined at grafana-dashboard/main.json
# available to grafana for provisioning. see ../values.yaml for more info
# see also this grafana community thread:
# https://community.grafana.com/t/how-to-provision-a-dashboard-from-grafana-com-dashboards-when-deploying-grafana-using-the-helm-chart/46341/4
# TODO: auto load all available dashboards (support more than one)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  labels:
    grafana_dashboard: "1"
data:
  dashboard.json: |
{{ .Files.Get "grafana-dashboards/main.json" | indent 4 }}
