apiVersion: apps/v1
kind: Deployment
metadata:
  name: documentation-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      containers:
      - name: docs-webserver
        image: {{ .Values.backend_image }}
        command: [ "/bin/bash", "-c", "--" ]
        args: [ "mkdocs serve" ]
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: docs
spec:
  selector:
    app: docs
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8000
