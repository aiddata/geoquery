apiVersion: apps/v1
kind: Deployment
metadata:
  name: info
  namespace: {{ .Release.Namespace }}
  labels:
    app: info
spec:
  replicas: 1
  selector:
    matchLabels:
      app: info
  template:
    metadata:
      labels:
        app: info
    spec:
      containers:
      - name: info
        image: {{ .Values.backend_image }}
        command: [ "/bin/bash", "-c", "--" ]
        args: [ "uvicorn src.gqcore.api.main:app --host 0.0.0.0 --port 8000" ]
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: info
spec:
  selector:
    app: info
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8000