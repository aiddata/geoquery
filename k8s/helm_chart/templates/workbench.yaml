{{- $pvname := printf "%s-%s" "geo-datasets-pvc-workbench" .Release.Name }}
{{- $pvexists := lookup "v1" "persistentvolume" .Release.Namespace $pvname }}
{{- if not $pvexists -}}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ $pvname }}
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: geo-datasets-pvc
  {{- toYaml .Values.geo_datasets_volume | nindent 2 }}
{{- end }}
---
{{- $pvcexists := lookup "v1" "PersistentVolumeClaim" .Release.Namespace "geo-datasets-pvc" }}
{{- if not $pvcexists }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geo-datasets-pvc-workbench
  annotations:
    "helm.sh/resource-policy": keep
spec:
  storageClassName: {{ .Values.geo_datasets_volume.storageClassName }}
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
{{- end }}

{{ if .Values.dev.enabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: workbench
  namespace: {{.Release.Namespace}}
spec:
  serviceAccount: geoquery-super
  serviceAccountName: geoquery-super
  volumes:
  - name: gq-config-vol
    configMap:
      name: gq-config
  - name: postgis-secret-vol
    secret:
      secretName: geoquery-postgis
      optional: true
  - name: email-secret-vol
    secret:
      secretName: geoquery-gmail
      optional: true
  - name: geo-datasets
    persistentVolumeClaim:
      claimName: geo-datasets-pvc-workbench
  containers:
  - name: python
    image: {{ .Values.backend_image }}
    command: [ "/bin/bash", "-c", "--" ]
    args: [ "while true; do sleep 30; done;" ]
    volumeMounts:
    - name: gq-config-vol
      mountPath: /config
    - name: postgis-secret-vol
      mountPath: /secrets/db
    - name: email-secret-vol
      mountPath: /secrets/email
    - name: geo-datasets
      mountPath: /geo-datasets
    resources:
      requests:
        cpu: 6
{{- end -}}
