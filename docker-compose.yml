services:
  db:
    image: postgis/postgis:17-master
    environment:
      - POSTGRES_DB=geoquery
      - POSTGRES_USER=django_user
      - POSTGRES_PASSWORD=dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app/backend
      - ./results:/app/results
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DB_HOST=db
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - RESULTS_DIR=/app/results
      - DOWNLOAD_BASE_URL=http://localhost:8000
      - PG_DBNAME=geoquery
      - PG_USER=django_user
      - PG_PASSWORD=dev_password
      - PG_HOST=db
      - PG_PORT=5432
      - PG_SSL_MODE=disable
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: uv run celery -A geoquery worker --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./data:/app/backend/dev_data
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DB_HOST=db
      - PG_DBNAME=geoquery
      - PG_USER=django_user
      - PG_PASSWORD=dev_password
      - PG_HOST=db
      - PG_PORT=5432
      - PG_SSL_MODE=disable
    depends_on:
      - db
      - redis

  beat:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: uv run celery -A geoquery beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DB_HOST=db
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      target: dev
    command: bun run dev --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
