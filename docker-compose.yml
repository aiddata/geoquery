services:
  db:
    image: postgis/postgis:17-master
    environment:
      - POSTGRES_DB=geoquery
      - POSTGRES_USER=django_user
      - POSTGRES_PASSWORD=dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine

  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: uv run python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./results:/results
      - ./data:/data
    environment:
      - DJANGO_DEBUG=true
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DB_HOST=db
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - RESULTS_DIR=/results
      - DOWNLOAD_BASE_URL=http://localhost:8000
      - PROTOMAPS_API_KEY=${PROTOMAPS_API_KEY}
      - GITHUB_GIST_TOKEN=${GITHUB_GIST_TOKEN}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - PG_DBNAME=geoquery
      - PG_USER=django_user
      - PG_PASSWORD=dev_password
      - PG_HOST=db
      - PG_PORT=5432
      - PG_SSL_MODE=disable
    depends_on:
      - db
      - rabbitmq

  worker-processing:
    build:
      context: .
      dockerfile: backend/Containerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: uv run celery -A geoquery worker -Q processing --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./data:/data:ro
      - ./results:/results
    environment:
      - DJANGO_DEBUG=true
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DB_HOST=db
      - RESULTS_DIR=/results
      - DOWNLOAD_BASE_URL=http://localhost:8000
      - PG_DBNAME=geoquery
      - PG_USER=django_user
      - PG_PASSWORD=dev_password
      - PG_HOST=db
      - PG_PORT=5432
      - PG_SSL_MODE=disable
    depends_on:
      - db
      - rabbitmq

  worker-background:
    build:
      context: .
      dockerfile: backend/Containerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: uv run celery -A geoquery worker -Q background --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./results:/results
      - ./assets:/assets
    environment:
      - DJANGO_DEBUG=true
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DB_HOST=db
      - RESULTS_DIR=/results
      - ASSETS_DIR=/assets
      - DOWNLOAD_BASE_URL=http://localhost:8000
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - GITHUB_GIST_TOKEN=${GITHUB_GIST_TOKEN}
      - PG_DBNAME=geoquery
      - PG_USER=django_user
      - PG_PASSWORD=dev_password
      - PG_HOST=db
      - PG_PORT=5432
      - PG_SSL_MODE=disable
    depends_on:
      - db
      - rabbitmq

  beat:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: uv run celery -A geoquery beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    environment:
      - DJANGO_DEBUG=true
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DB_HOST=db
      - PG_DBNAME=geoquery
      - PG_USER=django_user
      - PG_PASSWORD=dev_password
      - PG_HOST=db
      - PG_PORT=5432
      - PG_SSL_MODE=disable
    depends_on:
      - db
      - rabbitmq

  frontend:
    build:
      context: .
      dockerfile: frontend/Containerfile
      target: dev
    command: bun run dev --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./docs:/app/docs
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
