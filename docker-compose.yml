services:
  db:
    image: postgis/postgis:17-master
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=geoquery
      - POSTGRES_USER=django_user
      - POSTGRES_PASSWORD=dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: uv run python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./results:/app/results
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DB_HOST=db
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - RESULTS_DIR=/app/results
      - DOWNLOAD_BASE_URL=http://localhost:8000
    depends_on:
      - db
      - rabbitmq

  worker:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: uv run celery -A geoquery worker --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./data:/app/backend/dev_data
      - ./results:/app/results
      - ./assets:/app/assets
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DB_HOST=db
      - RESULTS_DIR=/app/results
      - ASSETS_DIR=/app/assets
      - DOWNLOAD_BASE_URL=http://localhost:8000
    depends_on:
      - db
      - rabbitmq

  beat:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: uv run celery -A geoquery beat --loglevel=info
    volumes:
      - ./backend:/app/backend
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - DB_HOST=db
    depends_on:
      - db
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    command: bun run dev --host
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
