<md-content class="remaining-height">
  <div md-padding flex="50" flex-offset="25">
    <br>
    <center>
      <h2>Request Search</h2>
      <h4 class="headline">Enter E-mail to View the Status of Your Requests</h4>
    </center>
    <br>
    <form layout="column"
        layout-padding
        layout-align="top"
        name="emailForm">
        <md-input-container class="condensed">
          <label>e-mail</label>
          <input
              ng-model="requestForm.email"
              ng-enter="emailForm.$valid ? lookup() : null"
              ng-pattern='/^(([^<>()\[\]\\.,;:\s@"]+(\.[^<>()\[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/'
              name="email"
              type="email"
              placeholder=""
              required
              md-no-float
              style="height: 50px;">
        </md-input-container>

        <md-button md-no-ink
            class="md-primary"
            ng-click="lookup()"
            ng-disabled="!emailForm.$valid">Lookup</md-button>
      </form>
      <br>
      <div layout="column" ng-hide="$root.boundaryData">
        <md-button class="md-primary" ui-sref="map"> Start A New Request </md-button>
      </div>
      <div layout="row" ng-hide="!$root.boundaryData">
        <md-button class="md-primary" ui-sref="map" flex="50"> Start A New Request </md-button>
        <md-divider></md-divider>
        <md-button class="md-primary" ui-sref="search(boundaryData)" flex="50"> Return to Current Request </md-button>
      </div>
  </div>
</md-content>
