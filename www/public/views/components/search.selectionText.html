<md-card id="selectionText" ng-hide="!dataset || !dataset.type">
<md-content class="selection-text-header">
  <md-toolbar>
    <div class="md-toolbar-tools">

      <div style="overflow-y: hidden; margin-top: -5px" flex>
        <md-input-container class="condensed no-label" flex md-no-float style="font-size: 16px; width: 70%">
          <input class="inputsm" ng-model="selectionData.name" placeholder="Selection Name" ng-change="selectionData.renamed = true">
        </md-input-container>

        <small ng-if="dataset && dataset.type == 'release'"
          style="padding-left: 10px">
          <br>
          <i class="fa fa-exclamation-triangle" aria-hidden="true"
             ng-hide="totals.projects && totals.locations"></i>
          <strong>{{ totals.projects }}</strong> projects /
          <strong>{{ totals.locations }}</strong> locations
        </small>
      </div>

      <md-button class="md-raised toggle" aria-label="Reset Filters" md-no-ink
        ng-class="{'md-warn md-hue-2': selectionData.canAdd, 'md-primary md-hue-1': !selectionData.canAdd }"
        ng-click="clearFilters()"
        ng-show="selectionData.canReset"
        ng-disabled="atLimit">
        <i class="fa fa-lg fa-refresh" aria-hidden="true"></i>&nbsp;&nbsp;
        <span ng-show="selectionData.canAdd">Reset</span>
        <span ng-show="!selectionData.canAdd">New Selection</span>
      </md-button>

      <md-button class="md-raised md-primary" aria-label="Add to Request" md-no-ink
          ng-disabled="!selectionData.canAdd"
          ng-click="addToCart()">
        <i class="fa fa-lg fa-plus" aria-hidden="true"></i>&nbsp;&nbsp;
        <span ng-show="selectionData.canAdd || dataset.type === 'raster' || !(totals.projects && totals.locations)">Add to Request</span>
        <span ng-show="!selectionData.canAdd && dataset.type !== 'raster' && (totals.projects && totals.locations)">Added to Request</span>
      </md-button>

    </div>
  </md-toolbar>
</md-content>

<md-card-content flex>

  <plain-text-query
    query-dataset="dataset"
    query-geography="geography.title"
    query-filters="filters"
    query-options="options"
    query-editable="true"></plain-text-query>

</md-card-content>
</md-card>
<div id="searchOverlay"
    class="remaining-height slide-right"
    ng-show="showOverlay && (!dataset || !dataset.type)">
  <p ng-repeat="paragraph in dataSelectionIntro">{{ paragraph }}</p>
</div>
