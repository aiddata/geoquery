<div layout="column"
    flex="33"
    ng-repeat="option in options" >

  <md-card
      class="filter-card"
      flex="100"

      ng-hide="!option.data || option.data.length <= 1">

    <md-card-header>
      <md-card-header-text flex="100">
        <small class="md-subhead">{{ option.name }}
          <small class="text-muted">({{ option.checkedCount || 0 }}/{{ option.data.length }})</small>
        </small>
      </md-card-header-text>

      <span flex></span>

      <!-- Buttons -->
      <a href="" class="toolbar-link"
          ng-hide="!option.checkedCount"
          ng-click="toggleAll(option, true)">
          <md-tooltip md-delay="500"> Reset Options Field </md-tooltip>
        <i class="fa fa-refresh fa-lg" aria-hidden="true"></i>
      </a>
    </md-card-header>

    <div style="overflow-y: auto"
        layout="column"
        flex>

      <md-list class="md-dense">
        <md-list-item md-no-ink
          ng-if="option.data && option.data.length > 1">

          <md-checkbox style="md-primary"
              ng-init="option.allChecked = false"
              ng-checked="option.allChecked"
              ng-click="toggleAll(option, option.allChecked)"
              md-no-ink></md-checkbox>

          <p>All {{ option.name.toLowerCase() }}</p>

          <md-divider></md-divider>

        </md-list-item>

        <md-list-item
            ng-repeat="choice in option.data | orderBy:'start':true"
            md-no-ink>

          <md-checkbox style="md-primary"
              ng-init="choice.checked = false"
              ng-checked="choice.checked"
              ng-click="toggleOption(!choice.checked, choice, option)"
              md-no-ink></md-checkbox>

          <p ng-if="(!choice.start && !choice.end) || !dataset.temporal.format">{{ choice.name }}</p>
          <p ng-if="(choice.start || choice.end) && dataset.temporal.format">
            {{ getTimeStamp(choice.start, dataset.temporal.format) ||
              getTimeStamp(choice.end, dataset.temporal.format) }}
          </p>

          <md-divider></md-divider>

        </md-list-item>
      </md-list>
    </div>
 </md-card>

</div>
