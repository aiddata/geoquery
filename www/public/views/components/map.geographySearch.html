<md-content class="md-padding" flex="100">
  <form uib-collapse="showFeaturedSearches"
      ng-submit="$event.preventDefault()">

    <h4 class="md-primary">Select a Boundary to Begin Data Extraction</h4>

    <md-autocomplete
        md-no-cache="false"
        md-selected-item="formData.boundary"
        md-search-text="formData.searchText"
        md-items="item in boundaries | filter: { search: formData.searchText }"
        md-selected-item-change="selectedItemChange(item)"
        md-select-on-match="true"
        md-match-case-insensitive="true"
        md-item-text="item.search"
        md-min-length="0"
        placeholder="Select boundaries">

      <md-item-template>
        <span md-highlight-text="formData.searchText" md-highlight-flags="ig">
        {{ item.title || item.name }}
        </span>
        <em class="text-muted"><span md-highlight-text="formData.searchText" md-highlight-flags="gi">{{ item.tags }}</span></em>
      </md-item-template>

      <md-not-found>
        No boundaries matching "{{formData.searchText}}" were found.
      </md-not-found>
    </md-autocomplete>


    <div ng-hide="formData.boundary">
      <br>
      <p class="text-muted">
        Top Searches:
        <em ng-repeat="item in [boundaries[0], boundaries[3], boundaries[6], boundaries[8]]">
          <a class="md-primary" href="" ng-click="selectFromFeatured(item)">{{item.name}}</a>
          <span ng-if="!$last">,</span>
        </em>
      </p>

      <md-button class="md-primary" ng-click="showFeaturedSearches = true;">
        <span>View Other Popular Searches...</span>
      </md-button>
    </div>


    <div ng-hide="!formData.subboundary">
      <md-divider></md-divider>
      <br>

      <md-radio-group ng-model="formData.subboundary">
        <label>Select a Subboundary</label>
        <md-radio-button
            ng-repeat="sub in subBoundaries"
            ng-value="sub.name"
            aria-label="{{ sub.title }}">
          {{ sub.title }}
        </md-radio-button>
      </md-radio-group>


      <md-divider></md-divider>
      <br>

      <div layout="row" layout-align="space-between">
        <md-button class="md-raised" ng-click="formData.searchText = ''">
          <i class="fa fa-angle-double-left" aria-hidden="true"></i>
          Back
        </md-button>

        <md-button class="md-raised md-accent md-hue-5" ng-click="defineBoundary()">
          Search Datasets
          <i class="fa fa-angle-double-right" aria-hidden="true"></i>
        </md-button>
      </div>
    </div>

  </form>

  <div uib-collapse="!showFeaturedSearches;">
    <a class="md-primary" href=""
        ng-click="showFeaturedSearches = false"><i class="fa fa-times" aria-hidden="true"></i></a>

    <md-list class="md-dense" flex>
      <md-list-item
          ng-repeat="item in boundaries"
          ng-click="selectFromFeatured(item)">

        <a href="">{{ item.search }}</a>
      </md-list-item>
    </md-list>
  </div>

</md-content>
