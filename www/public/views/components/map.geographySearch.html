<md-content class="md-padding">
  <form ng-submit="$event.preventDefault()">
    <md-autocomplete
        md-no-cache="false"
        md-selected-item="formData.boundary"
        md-search-text="formData.searchText"
        md-items="item in boundaries | filter: { name: formData.searchText }"
        md-selected-item-change="selectedItemChange(item)"
        md-select-on-match="true"
        md-match-case-insensitive="true"
        md-item-text="item.name"
        md-min-length="0"
        placeholder="Ex: Example 1, Example 2">

      <md-item-template>
        <span md-highlight-text="formData.searchText" md-highlight-flags="^i">{{item.name}}</span>
      </md-item-template>

      <md-not-found>
        No boundaries matching "{{formData.searchText}}" were found.
      </md-not-found>

    </md-autocomplete>

    <br>
    <div uib-collapse="formData.boundary">
      <md-button class="md-primary" ng-click="showFeaturedSearches = true;">
        <span>View Other Popular Searches</span>
      </md-button>
    </div>

    <div uib-collapse="!formData.subboundary">
      <md-divider></md-divider>
      <br>

      <md-radio-group
          ng-model="formData.subboundary">

        <label>Select a Subboundary</label>

        <md-radio-button
            ng-repeat="sub in subBoundaries"
            ng-value="sub.name"
            aria-label="{{ sub.title }}">
          {{ sub.title }}
        </md-radio-button>

      </md-radio-group>

      <md-divider></md-divider>
      <br>

      <div layout="row" layout-align="space-between">

        <md-button class="md-raised"
            ng-click="formData.searchText = ''">
          <i class="fa fa-angle-double-left" aria-hidden="true"></i>
          Back
        </md-button>

        <md-button class="md-raised md-accent md-hue-5"
            ng-click="defineBoundary()">
          Search Datasets
          <i class="fa fa-angle-double-right" aria-hidden="true"></i>
        </md-button>
      </div>

    </div>

  </form>

</md-content>
<div ng-show="showFeaturedSearches === true;">
  <md-list class="md-dense" flex>
    <md-list-item
        ng-repeat="item in boundaries"
        ng-click="selectFromFeatured(item.name)">

      <div class="md-list-item-text" layout="column">
        <p>{{ item.name }}</p>
      </div>
    </md-list-item>
  </md-list>
</div>
