<div class="container-fluid">
  <form>
    <div class="form-group">
      <label>Search Boundaries</label>

      <angucomplete-alt id="ex1"
          placeholder="Search boundaries"
          pause="100"
          selected-object="formData.boundary"
          local-data="boundaries"
          search-fields="name"
          override-suggestions="true"
          title-field="name"
          minlength="0"
          input-class="form-control"/>
      </angucomplete-alt

      <em class="text-muted"> Ex: Example 1, Example 2 </em>
    </div>

    <div class="form-group"
        ng-if="subBoundaries.length"
        ng-show="subBoundaries.length > 1">

      <label>Select a SubBoundary</label>

      <div class="radio" ng-repeat="sub in subBoundaries">

        <label>
          <input type="radio" name="subboundary"
              ng-model="formData.subboundary"
              ng-value="sub.name">

          {{ sub.title }}
        </label>

      </div>
    </div>

    <div class="form-group text-right"
        uib-collapse="!formData.boundary || !formData.subboundary">

      <button class="btn btn-success"
          ng-click="defineBoundary()">
        Search Datasets
        <i class="fa fa-arrow-circle-o-right fa-lg" aria-hidden="true"></i>
      </button>
    </div>
  <form>
</div>
