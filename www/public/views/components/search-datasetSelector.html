<div ng-style="dataStyle">
  <br>

  <button class="btn btn-default break-after break-md"
      ui-sref="map">
    <i class="fa fa-angle-double-left" aria-hidden="true"></i>
    Return to Map
  </button>

  <div class="row padding-sm">
    <div class="col-md-4"
        ng-repeat="type in dataTypes">
      <button class="btn btn-block"
          ng-class="{'btn-primary': dataFilters.type === type.value, 'btn-info': dataFilters.type !== type.value}"
          ng-click="dataFilters.type = type.value;">
        {{ type.text }}
        <span class="badge pull-right" ng-show="dataFilters.type === type.value">{{ datasets.filtered.length }}</span>
      </button>
    </div> <!-- /.col-md-4 -->
  </div> <!-- /.row -->

  <div class="row padding-sm">
    <div class="col-md-6">

      <div class="input-group input-group-sm">
        <span class="input-group-btn">
            <button class="btn btn-sm btn-primary"
                ng-click="fields.descending = !fields.descending"
                ng-switch="fields.descending">
              <i ng-switch-when="false" class="fa fa-sort-asc"></i>
              <i ng-switch-when="true" class="fa fa-sort-desc"></i>
            </button>
        </span>

        <select class="form-control"
          ng-model= "fields.selected"
          ng-options="f as f for f in fields.options"></select>
      </div>

    </div> <!-- /.col-md-6 -->

    <div class="col-md-6">
      <div class="input-group input-group-sm">
        <span class="input-group-addon">
          <i class="fa fa-search" aria-hidden="true"></i>
        </span>
        <input class="form-control"
            placeholder="search datasets"
            ng-model="dataFilters.title">
      </div> <!-- /.input-group -->
    </div><!-- /.col-md-6 -->
  </div> <!-- /.row -->

  <div class="list-group">
    <a href=""
        class="list-group-item"
        ng-repeat="set in datasets.filtered = (datasets.options | filter: dataFilters) | orderBy: fields.selected : fields.descending"
        ng-class="{ 'active' : datasets.selected === set.name }"
        ng-click="selectDataset(set)">
      {{ set.title }} - {{ set.type }}
    </a>
  </div>
  <p ng-hide="datasets.filtered.length"> No Datasets Found </p>
</div>
