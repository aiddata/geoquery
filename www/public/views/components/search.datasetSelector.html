<md-content>
  <br>

  <md-button class="md-primary" ui-sref="map">
      <i class="fa fa-angle-double-left" aria-hidden="true"></i>
      Return to Map
  </md-button>

  <md-nav-bar md-selected-nav-item="dataFilters.type" nav-bar-aria-label="Data Type">
    <md-nav-item
        ng-repeat="type in dataTypes"
        ng-click="dataFilters.type = type.value;"
        md-nav-click=""
        name="{{ type.value }}">
      {{ type.text }}
    </md-nav-item>
  </md-nav-bar>

  <md-list flex ng-init="showSearchTools = true">

    <md-subheader class="md-no-sticky">
      <a href="" ng-click="showSearchTools = !showSearchTools">
        <i class="fa fa-search" aria-hidden="true"></i>
        Search Tools
      </a>

      <span class="label label-primary label-circle pull-right"
        style="margin-top: -5px;">
        {{ datasets.filtered.length }}
      </span>
    </md-subheader>

    <md-divider></md-divider>

    <div uib-collapse="showSearchTools">
      <div layout="row" layout-padding>
        <md-input-container md-no-float class="flex-50 condensed">
          <label> Search Datasets </label>
          <input ng-model="dataFilters.title" placeholder="">
        </md-input-container>

        <md-input-container class="flex-30 condensed">
          <label>Sort by</label>
          <md-select ng-model="fields.selected">
            <md-option ng-repeat="field in fields.options" value="{{ field }}">
              {{ field }}
            </md-option>
          </md-select>
        </md-input-container>

        <md-input-container class="flex-20 condensed">
          <md-button class="md-icon-button md-primary"
              aria-label="Sort Datasets"
              ng-click="fields.descending = !fields.descending"
              ng-switch="fields.descending">
            <i ng-switch-when="false" class="fa fa-lg fa-sort-asc"></i>
            <i ng-switch-when="true" class="fa fa-lg fa-sort-desc"></i>
          </md-button>
        </md-input-container>
      </div>

      <md-divider></md-divider>
    </div>

    <md-list-item class="md-3-line"
        ng-class="{ 'active' : datasets.selected === set.name }"
        ng-repeat="set in datasets.filtered = (datasets.options | filter: dataFilters) | orderBy: fields.selected : fields.descending"
        ng-click="selectDataset(set)">

      <div class="md-list-item-text" layout="column">
        <h5>{{ set.title }} </h5>
        <p>{{ set.type }}</p>
        <p> <span ng-repeat="tag in set.extras.tags">{{ tag }} </span> </p>
      </div>
      <md-divider></md-divider>
    </md-list-item>

    <md-list-item ng-hide="datasets.filtered.length">
      <p> No Datasets Found </p>
    </md-list-item>
    
  </md-list>
</md-content>
