<md-sidenav
    md-component-id="right"
    md-is-open="menu"
    class="md-sidenav-right">

  <md-toolbar>
    <div class="md-toolbar-tools">
      <a href="" class="toolbar-link" ng-click="menu=false">
        <i class="fa fa-times" aria-hidden="true"></i>
      </a>
    </div>
  </md-toolbar>

  <md-content md-padding flex>
    <div layout="column" layout-padding layout-align="top center">

      <md-button class="md-raised md-accent"
          style="width: 100%"
          ng-disabled="!(queryObj.release_data && queryObj.release_data.length) && !(queryObj.raster_data && queryObj.raster_data.length)"
          ui-sref="checkout">
        Checkout
      </md-button>

      <h3 class="md-headline text-center"
          ng-show="!(queryObj.release_data && queryObj.release_data.length) && !(queryObj.raster_data && queryObj.raster_data.length)">
        Your Cart is Empty
      </h3>

    </div>
  </md-content>

  <div ng-if="(queryObj.release_data && queryObj.release_data.length) || (queryObj.raster_data && queryObj.release_data.length)">
    <md-divider></md-divider>

    <md-list ng-repeat="(type, queries) in { release_data: queryObj.release_data, raster_data: queryObj.raster_data }">
      <div ng-repeat="q in queries"
          ng-init="dataset = datasetDetails(q); hidden= true;">

        <md-list-item>
          <a href="" class="md-primary" ng-click="hidden=!hidden;">
              <i class="fa fa-chevron-right" aria-hidden="true"
                  style="margin-right: 10px;"
                  ng-class="{ 'fa-rotate-90': !hidden }"></i>
            {{ q.unique_name }}
          </a>

          <a href="" class="md-secondary md-warn" ng-click="removeQuery(q, type)">
            <i class="fa fa-minus-circle fa-lg" aria-hidden="true"></i>
          </a>

      </md-list-item>

        <div layout-padding uib-collapse="hidden">
          <plain-text-query
            ng-if="!hidden"
            query-dataset="dataset"
            query-geography="queryObj.boundary.title"
            query-filters="q.filters"
            query-options="q"
            query-editable="false"></plain-text-query>
        </div>

        <md-divider></md-divider>
      </div>
    </md-list>
  </div>
</md-sidenav>
