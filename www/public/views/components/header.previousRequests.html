<md-sidenav
    md-component-id="previousRequests"
    md-is-open="menu"
    class="md-sidenav-right">

  <md-toolbar>
    <div class="md-toolbar-tools">
      <a href="" class="toolbar-link" ng-click="menu=false">
        <i class="fa fa-times" aria-hidden="true"></i>
      </a>
      <span flex></span>
      <h5 class="md-headline">
        Previous Requests
      </h5>
    </div>
  </md-toolbar>


  <md-content md-padding>
    <div ng-if="!requests.length">
      <div layout="column" layout-padding layout-align="top">

        <md-input-container class="condensed">
          <label>e-mail</label>
          <input ng-model="email">
        </md-input-container>

        <md-button md-no-ink
            class="md-primary"
            ng-click="lookup()">Lookup</md-button>

      </div>
    </div>
    <div ng-if="requests.length" layout="row" layout-padding layout-align="top">
      <md-button md-no-ink
          class="md-primary md-raised md-hue-1"
          ui-sref="requests({ email: email })">
          Requests Home
      </md-button>

      <md-divider></md-divider>

      <md-button md-no-ink
          class="md-primary"
          ng-click="requests.splice(0)">
        Not {{ email }} ??
      </md-button>


    </div>
  </md-content>


  <md-list ng-if="requests.length">
    <process-breadcrumbs></process-breadcrumbs>


    <md-list-item
        ng-repeat="req in requests"
        ng-click="viewStatus(req._id.$id)"
        ng-init="status = getStage(req)">

      <span flex="60">{{ req.custom_name ? req.custom_name : 'Unamed Request ' }}</span>
      <span class="badge {{ status.name }}">{{ status ? status.name : 'unknown' }}</span>
      <span flex></span>
      <i class="fa fa-external-link-square" aria-hidden="true"></i>
    </md-list-item>
  </md-list>

</md-sidenav>
