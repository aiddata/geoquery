<div flex="100">
  <md-toolbar id='det-header'>
    <div class="md-toolbar-tools">

      <h2>
        <a href="http://www.aiddata.org/">
           <div class="logo"></div>
        </a>
      </h2>
      <span flex></span>

      <md-button class="md-icon-button header-button"
          aria-label="Help"
          ng-click="activeTab = 'help'">
        <md-tooltip> Help </md-tooltip>
        <i class="fa fa-question-circle" aria-hidden="true"></i>
      </md-button>

      <md-button class="md-icon-button header-button"
          aria-label="Past Requests"
          ng-click="activeTab = 'previousRequests'">
        <md-tooltip> View Past Requests </md-tooltip>
        <i class="fa fa-history" aria-hidden="true"></i>
      </md-button>

      <small ng-show="queryLen">
        <div class="label label-primary label-circle" style="margin-top: 10px">
          {{ queryLen || 0 }}
        </div>
      </small>

      <md-button class="md-icon-button header-button"
          aria-label="Cart"
          ng-click="activeTab = 'cart'">
        <md-tooltip> View Cart </md-tooltip>
        <i class='fa fa-shopping-cart' aria-hidden="true"></i>
      </md-button>

    </div>
  </md-toolbar>

  <md-toolbar class="process-header md-hue-6">
    <div class="md-toolbar-tools process">

        <md-button class="md-button-pimary process-button"
            ng-disabled="false"
            ng-class="{ 'current': currentStep.name === 'map' }"
            ui-sref="map"
            md-no-ink>

          <i class="fa fa-map-pin" aria-hidden="true"></i>
          1. Select Boundary
        </md-button>

        <span> / </span>

        <md-button class="md-button-pimary process-button"
            ng-disabled="false"
            ng-class="{ 'current': currentStep.name.indexOf('search') >= 0 }"
            ui-sref="search"
            md-no-ink>

          <i class="fa fa-star" aria-hidden="true"></i>
          2. Customize Datasets
        </md-button>

        <span> / </span>

        <md-button class="md-button-pimary process-button"
            ng-disabled="false"
            ng-class="{ 'current': currentStep.name === 'checkout' }"
            ui-sref="checkout"
            md-no-ink>

          <i class="fa fa-shopping-cart" aria-hidden="true"></i>
          3. Checkout
        </md-button>
    </div>
  </md-toolbar>
  <header-cart menu-option="'cart'" menu-control="activeTab"></header-cart>
  <header-help menu-option="'help'" menu-control="activeTab"></header-help>
  <header-previous-requests menu-option="'previousRequests'" menu-control="activeTab"></header-previous-requests>
</div>
