<div class="container-fluid">
  <form>
    <div class="form-group">
      <label>Search Boundaries</label>

      <angucomplete-alt id="ex1"
          placeholder="Search boundaries"
          pause="100"
          selected-object="formData.boundary"
          local-data="boundaries"
          search-fields="name"
          override-suggestions="true"
          title-field="name"
          minlength="0"
          input-class="form-control"/>
      </angucomplete-alt

      <em class="text-muted"> Ex: Example 1, Example 2 </em>
    </div>

    <div class="form-group"
        ng-if="subBoundaries.length"
        ng-init="formData.subboundary = subBoundaries[0].name">

      <label>Select a SubBoundary</label>

      <div ng-repeat="sub in subBoundaries">

        <input type="radio" name="subboundary"
            ng-model="formData.subboundary"
            ng-value="sub.name">

        {{ sub.title }}

      </div>
    </div>

    <div class="form-group text-right" uib-collapse="!formData.subboundary">
      <button class="btn btn-success" ui-sref="search({ geomId: formData.subboundary })">
        Search Datasets
        <i class="fa fa-arrow-circle-o-right fa-lg" aria-hidden="true"></i>
      </button>
    </div>
  <form>
</div>
