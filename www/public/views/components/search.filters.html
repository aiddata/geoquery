<div layout="column"
    ng-repeat="filter in filterOptions.filterTypes | orderBy: filter"
    ng-show="dataset && dataset.type === 'release'"
    ng-init="hideSubHeader = true;"
    flex="33">

  <md-card flex="100" class="filter-card">

    <!-- Toolbar -->
    <md-toolbar>
      <div class="md-toolbar-tools">

        {{filterInfo[filter].text}}

        <span flex></span>

        <a href=""
            class="toolbar-link"
            ng-hide="!filters[filter]"
            ng-click="toggleAll(filter)">
          <i class="fa fa-refresh"></i>
        </a>

        <a href=""
            class="toolbar-link"
            ng-hide="filterInfo[filter].type !== 'options'"
            ng-click="hideSubHeader = !hideSubHeader">
          <i class="fa fa-search"></i>
        </a>

        <span class="label label-primary label-circle">
          {{ filterInfo[filter].filtered.length || 0 }}
        </span>

      </div>
    </md-toolbar>

    <!-- SubHeader -->
    <div uib-collapse="hideSubHeader">
      <md-subheader>

      <md-input-container
          class="condensed no-label md-primary"
          md-no-float>

          <input
              aria-label="Search {{ filterInfo[filter].text }}"
              placeholder="Search {{ filterInfo[filter].text }}"
              ng-model="filterInfo[filter].searchFilter">

        </md-input-container>
      </md-subheader>
    </div>

    <!-- Content -->
    <md-content
        ng-switch="filterInfo[filter].type"
        layout="column"
        flex>

      <md-list ng-switch-when="options">

        <md-list-item>

          <md-checkbox
              aria-label="All  {{ filterInfo[filter].text }}"
              ng-checked="!filters[filter]"
              ng-click="toggleAll(filter)"
              ng-disabled="!filters[filter]"
              md-no-ink/></md-checkbox>

          <p> All  {{ filterInfo[filter].text }} </p>
          <md-divider></md-divider>

        </md-list-item>

        <md-list-item
            ng-repeat="option in filterInfo[filter].filtered = (filterOptions.distinct[filter] | filter: filterInfo[filter].searchFilter)">

          <md-checkbox
              aria-label="{{ option }}"
              ng-click="toggleFilter(filter, option)"
              ng-checked="filters[filter] && filters[filter].indexOf(option) >= 0;"
              md-no-ink></md-checkbox>

          <p> {{ option }} </p>
          <md-divider></md-divider>
        </md-list-item>
      </md-list>


      <md-card-content
          ng-switch-when="range">

          <search-filters-range
              filterdata="filterInfo[filter]"
              filteroptions="filterOptions.distinct[filter]"
              activefilters="filters[filter]"></search-filters-range>
      </md-card-content>

  </md-card>

</div>
