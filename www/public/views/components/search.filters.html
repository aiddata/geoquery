<div layout="row" class="layout-row"
    ng-show="dataset && dataset.type === 'release'">
  <div flex="33" class="flex-33"
      ng-repeat="filter in filterOptions.filterTypes | orderBy: filter">

    <md-card style="height: 370px; max-height-370; overflow-y: auto;"
        ng-if="filterInfo[filter]">

      <div ng-switch="filterInfo[filter].type">

         <md-card-content class="layout-row">
           <h4 class="flex"> {{filterInfo[filter].text}} </h4>
           <a href=""
               ng-hide="!filters[filter]"
               ng-click="toggleAll(filter)">
             <i class="fa fa-refresh"></i>
           </a>
         </md-card-content>

        <div ng-switch-when="options">
          <md-card-content class="layout-row" style="padding-top: 0px; padding-bottom: 0px;">
            <md-input-container md-no-float class="md-block" style="margin: 0px;">
              <input aria-label="Search {{ filterInfo[filter].text }}"
                  placeholder="Search"
                  ng-model="filterInfo[filter].searchFilter">
            </md-input-container>

            <span class="label label-primary label-circle"> {{ filterMatches.length }} </span>
          </md-card-content>

          <md-list>
            <md-list-item>
                  <md-checkbox md-no-ink aria-label="All  {{ filterInfo[filter].text }}"
                      ng-checked="!filters[filter]"
                      ng-click="toggleAll(filter)"
                      ng-disabled="!filters[filter]"/>
                  </md-checkbox>
                  <p>All  {{ filterInfo[filter].text }} </p>
              <!-- </div> -->

              <md-divider></md-divider>

            </md-list-item>

            <md-list-item
                ng-repeat="option in filterMatches = (filterOptions.distinct[filter] | filter: filterInfo[filter].searchFilter)">
              <md-checkbox md-no-ink aria-label="{{ option }}"
                    ng-click="toggleFilter(filter, option)"
                    ng-checked="filters[filter] && filters[filter].indexOf(option) >= 0;">
              </md-checkbox>
              <p> {{ option }}</p>
            </md-list-item>
          </md-list>
        </div>

        <md-card-content ng-switch-when="range">
          RANGE

          <md-slider md-invert ng-model="myValue" step="10" min="10" max="130">
          </md-slider>
        </md-card-content>
      </div>

    </md-card>
  <div>
</div>
