<md-card class="search-card">
  <md-toolbar class="md-hue-2" md-scroll-shrink>
    <div class="md-toolbar-tools">

      <span
        ng-init="showEdit=false;"
        ng-mouseover="showEdit=true;"
        ng-mouseleave="showEdit=false;">
        {{ request.name }}

        <a href=""
            ng-show="showEdit"
            ng-click="editing = !editing">
          <i class="fa fa-pencil-square-o" aria-hidden="true"></i>
        </a>

      </span>

      <span flex></span>

      <md-button class="md-fab md-mini md-warn md-hue-4" aria-label="Reset Search">
        <i class="fa fa-lg fa-refresh" aria-hidden="true"></i>
      </md-button>

      <md-button class="md-fab md-mini success-btn" aria-label="Add to Cart">
        <i class="fa fa-lg fa-cart-plus" aria-hidden="true"></i>
      </md-button>

    </div>
  </md-toolbar>

  <md-card-content
      flex>
      <span style="line-height: 3;"
        ng-repeat="item in queryStructure"
        ng-if="item.value && item.value.length">
        {{ item.pre }}

        <span ng-repeat="option in item.value">
          <span ng-show="item.value.length > 1 && $last"> and </span>
          <span ng-show="item.value.length > 1 && !$last">, </span>
          <div class="btn btn-sm"
              ng-class="{ 'btn-primary': item.optional, 'btn-info': !item.optional }"
              ng-click="item.optional ? removeFilter(item.key, option) : null">
            {{ option }}
            <i class="fa fa-times" aria-hidden="true" ng-show="item.optional"></i>
          </div>

        </span>

  </md-card-content>
</md-card>
