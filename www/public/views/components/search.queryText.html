<md-toolbar md-scroll-shrink>
  <div class="md-toolbar-tools">

    <md-button class="md-fab md-mini success-btn" aria-label="Add to Cart"
        ng-click="addToCart()">
      <md-tooltip md-delay="500" md-direction="top"> Add Request To Cart </md-tooltip>
      <i class="fa fa-lg fa-cart-plus" aria-hidden="true"></i>
    </md-button>

    <div>
      <md-input-container class="condensed no-label md-light"
        md-no-float>
        <md-tooltip md-delay="500" md-direction="top"> Name this Request </md-tooltip>
        <input ng-model="requestData.name" placeholder="Request Name">
      </md-input-container>

      <small ng-if="dataset && dataset.type == 'release'">
        <br>
        <strong>{{ totals.projects }}</strong> projects /
        <strong>{{ totals.locations }}</strong> locations
      </small>
    </div>

    <span flex></span>

    <a href class="toolbar-link"
        aria-label="Reset Search"
        ng-click="clearFilters()"
        ng-show="requestData.canReset">
      <md-tooltip md-delay="500" md-direction="top"> Reset Request </md-tooltip>
      <i class="fa fa-lg fa-refresh" aria-hidden="true"></i>
    </a>

  </div>
</md-toolbar>

<md-card-content flex>
  <plain-text-query
    query-dataset="dataset"
    query-geography="geography.title"
    query-filters="filters"
    query-options="options"
    query-editable="true"></plain-text-query>

</md-card-content>
